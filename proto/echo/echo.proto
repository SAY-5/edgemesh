syntax = "proto3";

package edgemesh.echo.v1;

option go_package = "github.com/SAY-5/edgemesh/proto/echo;echopb";

// Echo is the demo service used by the chaos suite. Every node exposes the
// same contract so the topology simulator can route arbitrary RPCs across
// the mesh.
service Echo {
  rpc Say(SayRequest) returns (SayResponse);
}

message SayRequest {
  string message = 1;
  uint32 hop = 2;
}

message SayResponse {
  string message = 1;
  string responder_id = 2;
  uint32 hop = 3;
}
